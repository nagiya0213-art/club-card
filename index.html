<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文化祭スタンプカード</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { font-size: 1.1rem; color: #333; margin-bottom: 20px; }
        
        .club-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .club-checkbox { display: none; }

        .club-card {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 4px 8px;
            box-sizing: border-box;
            user-select: none;
        }
        .club-name { 
            font-size: 0.75rem; 
            font-weight: bold; 
            color: #475569; 
            line-height: 1.2;
            word-break: break-all;
        }

        .club-card:hover { border-color: #cbd5e1; background-color: #f8fafc; }
        .club-checkbox:checked + .club-card {
            border-color: #3b82f6;
            background-color: #eff6ff;
            box-shadow: 0 0 0 1px #3b82f6;
        }
        .club-checkbox:checked + .club-card .club-name { color: #1d4ed8; }

        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn:hover { background-color: #1d4ed8; }
        
        #result-container { margin-top: 24px; display: none; }
        #cardCanvas { display: none; }
        #resultImage { max-width: 320px; width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .info-text { font-size: 0.85rem; color: #666; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>見に行った部活を選んでね</h1>
    
    <div class="club-grid">
        <label><input type="checkbox" class="club-checkbox" id="club-1" data-name="バスケットボール部" data-emoji="🏀" data-color="#f97316"><div class="club-card"><span class="club-name">バスケット<br>ボール部</span></div></label>
        <label><input type="checkbox" class="club-checkbox" id="club-2" data-name="ソフトテニス部" data-emoji="🎾" data-color="#84cc16"><div class="club-card"><span class="club-name">ソフトテニス部</span></div></label>
        <label><input type="checkbox" class="club-checkbox" id="club-3" data-name="バレーボール部" data-emoji="🏐
