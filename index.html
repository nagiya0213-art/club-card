<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>部活カードジェネレーター</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { font-size: 1.1rem; color: #333; margin-bottom: 20px; }
        
        .club-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .club-checkbox { display: none; }

        .club-card {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 4px 8px;
            box-sizing: border-box;
            user-select: none;
        }
        .club-name { 
            font-size: 0.75rem; 
            font-weight: bold; 
            color: #475569; 
            line-height: 1.2;
            word-break: break-all;
        }

        .club-card:hover { border-color: #cbd5e1; background-color: #f8fafc; }
        .club-checkbox:checked + .club-card {
            border-color: #3b82f6;
            background-color: #eff6ff;
            box-shadow: 0 0 0 1px #3b82f6;
        }
        .club-checkbox:checked + .club-card .club-name { color: #1d4ed8; }

        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        .btn:hover:not(:disabled) { background-color: #1d4ed8; }
        
        #result-container { margin-top: 24px; display: none; }
        canvas { max-width: 320px; width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .info-text { font-size: 0.85rem; color: #666; margin-top: 8px; }
        .loading { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>見に行った部活を選んでね</h1>
    
    <div id="loading-text" class="loading">スプレッドシートから画像データを読み中...</div>
    <div class="club-grid" id="grid-container">
        </div>

    <button class="btn" id="gen-btn" onclick="generateCard()" disabled>カード画像を生成する</button>

    <div id="result-container">
        <h3 style="font-size: 1rem; color: #475569; margin-bottom: 12px;">完成したカード</h3>
        <canvas id="cardCanvas" width="600" height="1000"></canvas>
        <p class="info-text">※画像を長押し、または右クリックで保存してね！</p>
    </div>
</div>

<script>
let globalClubData = [];

// ページを開いた瞬間に、スプシの中の文字と画像データを一発で持ってくる
window.onload = function() {
    if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(initializeGrid).getClubData();
    } else {
        document.getElementById('loading-text').innerText = "GAS環境外です（ローカルテスト用）";
    }
};

// スプシのデータを元に画面のボタン（グリッド）を自動作成する
function initializeGrid(data) {
    globalClubData = data;
    const container = document.getElementById('grid-container');
    container.innerHTML = '';

    data.forEach((club, index) => {
        // 表示用に部活名に改行を入れる処理（6文字超えたら適宜分割）
        let displayName = club.name;
        if (displayName.length > 6 && !displayName.includes('<br>')) {
            displayName = displayName.substring(0, 5) + '<br>' + displayName.substring(5);
        }

        const label = document.createElement('label');
        label.innerHTML = `
            <input type="checkbox" class="club-checkbox" id="${club.id}" data-index="${index}">
            <div class="club-card">
                <span class="club-name">${displayName}</span>
            </div>
        `;
        container.appendChild(label);
    });

    document.getElementById('loading-text').style.display = 'none';
    document.getElementById('gen-btn').disabled = false; // ボタンを押せるようにする
}

function generateCard() {
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    
    // 背景を白にする
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cols = 3;
    const rows = 6;
    const boxSize = 150;
    const gap = 24;
    
    const totalWidth = (cols * boxSize) + ((cols - 1) * gap);
    const totalHeight = (rows * boxSize) + ((rows - 1) * gap);
    
    const startX = (canvas.width - totalWidth) / 2;
    const startY = (canvas.height - totalHeight) / 2;

    const checkedTasks = [];

    // 18個のマス目を順番に描画していく
    globalClubData.forEach((club, i) => {
        const checkbox = document.getElementById(club.id);
        
        const row = Math.floor(i / cols);
        const col = i % cols;

        const x = startX + col * (boxSize + gap);
        const y = startY + row * (boxSize + gap);

        // --- ① 外枠（□）の描画 ---
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(x, y, boxSize, boxSize, 12);
        ctx.stroke();

        // --- ② 部活名の描画 ---
        ctx.textAlign = 'center';
        const centerX = x + (boxSize / 2);
        ctx.fillStyle = '#334155';
        ctx.font = 'bold 15px sans-serif';
        
        if (club.name.length > 6) {
            ctx.font = 'bold 12px sans-serif';
        }
        ctx.fillText(club.name, centerX, y + 35);

        // チェックされていて、かつスプシに画像がある場合、描画予定リストに入れる
        if (checkbox && checkbox.checked && club.imgData) {
            const img = new Image();
            img.src = club.imgData; // スプシから引っこ抜いた暗号テキスト画像
            checkedTasks.push({ img: img, x: x, y: y });
        }
    });

    if (checkedTasks.length === 0) {
        document.getElementById('result-container').style.display = 'block';
        return;
    }

    // 安全にすべての画像オブジェクトの読み込み完了を待ってからCanvasへスタンプ
    let loadedCount = 0;
    checkedTasks.forEach(task => {
        task.img.onload = function() {
            loadedCount++;
            if (loadedCount === checkedTasks.length) {
                drawAllImages();
            }
        };
        task.img.onerror = function() {
            loadedCount++;
            if (loadedCount === checkedTasks.length) {
                drawAllImages();
            }
        };
    });

    function drawAllImages() {
        checkedTasks.forEach(task => {
            if (task.img.complete && task.img.naturalWidth !== 0) {
                // 画像を正方形マスの中心、文字の下にぴったり配置（サイズ56px）
                const imgSize = 56;
                const imgX = task.x + (boxSize - imgSize) / 2;
                const imgY = task.y + 65;
                ctx.drawImage(task.img, imgX, imgY, imgSize, imgSize);
            }
        });
        document.getElementById('result-container').style.display = 'block';
    }
}
</script>

</body>
</html>
